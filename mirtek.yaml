

substitutions:
  device_name:    mirtek-gw
  friendly_name:  "Mirtek Gateway"
  meter_address:  "*****"   # ← адрес с корпуса счётчика (1..65000)
  poll_interval:  "300s"    # ← интервал опроса (мин. 60s)
  mqtt_prefix:    "mirtek"  # ← префикс MQTT топиков

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  libraries:
    - "SPI"
    - "SmartRC-CC1101-Driver-Lib=https://github.com/LSatan/SmartRC-CC1101-Driver-Lib"
    - "CRC=https://github.com/RobTillaart/CRC"

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO   # DEBUG или VERBOSE для диагностики

################################################################################
# Компонент загружается прямо с GitHub — локальные файлы не нужны
################################################################################
external_components:
  - source:
      type: git
      url: https://github.com/Alecseyyy/ESPHome-Mirt-830
      ref: main
    components: [ mirtek_cc1101 ]
    refresh: 1d

################################################################################
# SPI — CC1101
################################################################################
spi:
  clk_pin:  GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

################################################################################
# I2C — OLED SSD1306
# Дисплей подключается отдельно через стандартный ESPHome display компонент.
# Раскомментируйте если нужен дисплей.
